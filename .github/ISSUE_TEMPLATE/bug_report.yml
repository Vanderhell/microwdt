name: Bug report
description: Report a reproducible problem in microwdt behavior, tests, docs, or packaging.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Provide a minimal reproducer and exact toolchain details when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproducer
      description: Minimal code, commands, or fixture changes needed to reproduce.
      placeholder: |
        1. Configure with ...
        2. Build with ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: Toolchain
      description: Compiler, version, and platform.
      placeholder: clang 18 / gcc 13 / MSVC 19.x on ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, diagnostics, related commits, or regression range.
